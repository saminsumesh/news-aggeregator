{% extends 'base.html' %}
{% block title %}Delete Article — PulseNews{% endblock %}
{% block content %}
<div class="confirm-layout">
  <div class="confirm-card">
    <div class="confirm-icon">🗑</div>
    <h2>Delete Article?</h2>
    <p>Are you sure you want to permanently delete:</p>
    <blockquote class="confirm-title">"{{ article.title }}"</blockquote>
    <p class="confirm-warning">This action cannot be undone.</p>
    <form method="post" class="confirm-actions">
      {% csrf_token %}
      <button type="submit" class="btn-danger">Yes, Delete</button>
      <a href="{% url 'reporter:article_edit' article.pk %}" class="btn-secondary">Cancel</a>
    </form>
  </div>
</div>
{% endblock %}
